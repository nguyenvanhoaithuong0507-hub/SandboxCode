  - phiên bản: '1.11.0'
    Trạng thái: đã phê chuẩn
    ngày phê chuẩn: 2019-12
    thay đổi:
      - Đã chuyển trạng thái Thông số kỹ thuật máy sang *Đã phê duyệt*.
      - Cải thiện phần mô tả và bình luận.
      - Chỉ định các nguồn ngắt nào được dành riêng cho mục đích sử dụng tiêu chuẩn.
      - Đã phân bổ một số nguyên nhân ngoại lệ đồng bộ để sử dụng tùy chỉnh.
      - Xác định thứ tự ưu tiên của các ngoại lệ đồng bộ.
      - Bổ sung quy định rằng các lệnh xRET có thể, nhưng không bắt buộc,
        Xóa các đặt chỗ LR nếu có phần mở rộng A.
      - Đã đổi tên trường *WLRL* từ `mstatus`.MPP thành *WARL*.
      - Đã chuyển các trường `__x__ip` không sử dụng thành *WPRI* thay vì *WIRI*.
      - Đã chuyển các trường `misa` không sử dụng thành *WARL* thay vì *WIRI*.
      - Đã sửa lỗi biên tập mô tả sai cơ chế hoạt động của
        `mstatus.__x__IE` được ghi khi xảy ra ngoại lệ.
      - Mô tả sơ đồ mô phỏng các AMO bị lệch.
      - Xác định hành vi của các thanh ghi `misa` và `__x__epc` trong hệ thống.
        với IALIGN biến đổi.
      - Xác định hành vi ghi các giá trị mâu thuẫn vào biến `misa`.
        đăng ký.
      - Nội dung cụ thể của CSR trong quá trình sửa đổi XLEN.
      - Đã tách chương PLIC thành một tài liệu riêng.
  - phiên bản: '1.12.0'
    Trạng thái: đã phê chuẩn
    ngày phê chuẩn: 2021-12
    thay đổi:
      - Đã thay đổi MRET để xóa `mstatus`.MPRV khi thoát khỏi chế độ M.
      - Các vùng I/O được nới lỏng đã được chỉ định để tuân theo RVWMO. Trước đó
        Thông số kỹ thuật ngụ ý rằng các quy tắc PPO khác với hàng rào và việc mua/bán.
        Các chú thích không áp dụng.
      - Giới hạn kích thước và hình dạng của tập hợp đặt chỗ LR/SC khi sử dụng phương pháp dựa trên trang.
        bộ nhớ ảo.
      - Các thay đổi PMP yêu cầu tệp SFENCE.VMA trên bất kỳ thiết bị hart nào triển khai cơ chế dựa trên trang.
        bộ nhớ ảo, ngay cả khi VM hiện không được bật.
      - Đã xóa phần mở rộng N.
      - Đã định nghĩa CSR bắt buộc chỉ dành cho RV32 là `mstatush`, chứa hầu hết các thông tin cần thiết.
        Các trường tương tự như 32 bit trên của `mstatus` của RV64.
      - Đã định nghĩa CSR bắt buộc `mconfigptr`, nếu khác 0 thì chứa
        Địa chỉ của cấu trúc dữ liệu cấu hình.
      - Đã định nghĩa các CSR `mseccfg` và `mseccfgh`, dùng để kiểm soát tính bảo mật của máy.
        cấu hình.
      - Định nghĩa CSR `menvcfg` (và `menvcfgh` chỉ dành cho RV32), điều khiển nhiều chức năng khác nhau.
        đặc điểm của môi trường thực thi.
      - Phần được chỉ định của mã lệnh chính SYSTEM để sử dụng tùy chỉnh.
      - Cho phép ủy quyền vô điều kiện cho những người có quyền hạn thấp hơn can thiệp.
      - Thêm tùy chọn hỗ trợ big-endian và bi-endian.
      - Ưu tiên xử lý các ngoại lệ không khớp địa chỉ khi tải/lưu trữ/AMO.
        được xác định bởi cách triển khai liên quan đến lỗi trang tải/lưu trữ/AMO và
        ngoại lệ lỗi truy cập.
      - Các ngoại lệ điểm dừng phần mềm được phép ghi giá trị 0 hoặc `pc`.
        thành `__x__tval`.
      - Đã chỉ định các ràng buộc được nới lỏng cho việc đọc ngầm các vùng không có tính chất bất biến.

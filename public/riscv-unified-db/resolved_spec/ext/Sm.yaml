      - Làm rõ rằng MXR chỉ ảnh hưởng đến các truy cập bộ nhớ tường minh.
Mô tả: |
  Chương này mô tả các thao tác ở cấp độ máy có sẵn trong chế độ máy (M-mode), tức là
  Chế độ M là chế độ đặc quyền cao nhất trong bộ vi xử lý RISC-V. Chế độ M được sử dụng để truy cập cấp thấp vào phần cứng.
  Nền tảng này là chế độ đầu tiên được kích hoạt khi khởi động lại. Chế độ M cũng có thể được sử dụng để triển khai các tính năng mà
  Việc triển khai trực tiếp trên phần cứng quá khó khăn hoặc tốn kém. Kiến trúc tập lệnh cấp máy RISC-V
  Chứa một lõi chung được mở rộng tùy thuộc vào các cấp độ đặc quyền khác được hỗ trợ và
  Các chi tiết khác về việc triển khai phần cứng.
  Chương này mô tả kiến trúc cấp máy RISC-V, trong đó...
  Chứa một lõi chung được sử dụng với nhiều cấp độ giám sát khác nhau.
  Các chương trình dịch thuật và bảo vệ địa chỉ.

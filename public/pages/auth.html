<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - SandboxCodex</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../pages/pages.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="brand" style="font-size: 20px; margin-bottom: 10px">
            Sandbox<span class="brand-sub">Code<span class="cursor">x</span></span>
          </div>
          <p class="tagline">AI Software Engineer</p>
        </div>

        <div class="auth-tabs">
          <button class="tab active" data-tab="signin">Sign In</button>
          <button class="tab" data-tab="signup">Sign Up</button>
        </div>

        <div class="tab-content active" id="signin">
          <form class="auth-form">
            <div class="form-group">
              <label>Email</label>
              <input type="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" placeholder="Enter your password" required />
            </div>
            <div class="form-checkbox">
              <input type="checkbox" id="remember" />
              <label for="remember">Remember me</label>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            <a href="#" class="forgot-password">Forgot password?</a>
          </form>
        </div>

        <div class="tab-content" id="signup">
          <form class="auth-form">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" placeholder="John Doe" required />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" placeholder="you@example.com" required />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" placeholder="Create a password" required />
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
          </form>
        </div>

        <div class="auth-divider">OR</div>

        <div class="oauth-buttons">
          <button class="btn btn-outline btn-block">🔗 Continue with GitHub</button>
          <button class="btn btn-outline btn-block">🔗 Continue with Google</button>
        </div>

        <div class="auth-benefits">
          <p>✓ Free tier available</p>
          <p>✓ No credit card required</p>
          <p>✓ 3 projects included</p>
        </div>
      </div>

      <div class="auth-footer">
        <a href="#">Terms</a> | <a href="#">Privacy</a> | <a href="#">Support</a>
      </div>
    </div>

    <script src="../main.js"></script>
    <script src="../pages/auth.js"></script>
  </body>
</html>
